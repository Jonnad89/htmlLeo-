<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Getor de Tareas</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    
    <div class="card">
        <h1>Gestor de Tareas</h1>

        <div class="form-group">
            <input type="text" id="input-tarea" placeholder="Ej: Estudiar clases en JavaScript">
            <button id="btn-agregar">Agregar Tarea</button>
        </div>

        <p id="loading">Enviando al servidor...</p>

        <ul id="lista-tareas"></ul>

        <div class="stats">
            <span>Total tareas: <b id="total-cuenta">0</b> </span>
            <span>Estado: <b id="estado-resumen">Listo</b> </span>
        </div>
    </div>




    <script src="./gestorDeTareas.js"></script>
</body>
</html>
