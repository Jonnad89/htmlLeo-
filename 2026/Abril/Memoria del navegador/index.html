<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Task Tracker</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="container">
        <div class="crypto-header">
            <h2>Mercado Crypto</h2>
            <div class="price-card">
                <p>Bitcoin (BTC/USD)</p>
                <h3 id="btc-price">Cargado...</h3>
                <small id="update-time"></small>
            </div>
        </div>

        <div class="task-section">
            <h3>Mis Notas Guardadas</h3>
            <div class="input-group">
                <input type="text" id="task-input" placeholder="Escribi algo impotante">
                <button id="add-btn">Guardar</button>
            </div>
            <ul id="task-list"></ul>
            <button class="clear-btn" id="clear-btn">Borrar Memoria del Navegador</button>
        </div>
    </div>

    <script src="./app.js"></script>
</body>
</html>
