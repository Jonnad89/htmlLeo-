<!DOCTYPE html>

<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Document</title>

  </head>

  <body>
    <header>
      <h1>CyberSpace Tycoon</h1>
    </header>

    <main>
      <div class="contador-dinero-actual">
        <h3 id="dinero-actual">0</h3>
      </div>

      <div class="generar-container">
        <button id="generar-bytes-btn">Hackear por Bytes!</button>
      </div>

      <div class="panel-mejoras">
        <h3>Panel De Mejoras!! (UPGRADES)</h3>

        <div class="market-mejoras">
          <p class="mejoras">.</p>

          <p class="mejoras">..</p>

          <p class="mejoras">...</p>

          <p class="mejoras">....</p>

          <p class="mejoras">.....</p>

          <p class="mejoras">......</p>
        </div>
      </div>

      <div class="bytes-generados">
        <p>Bytes por click: <span id="bytes-por-click">1</span></p>

        <p>Bytes por Segundos: <span id="bytes-por-segundo">0</span></p>

        <div class="card-servidor" id="card-servidor">
          <button>
            Precio de cada servidor: <span id="precio-servidor">15</span>
          </button>

          <p>Servidores comprados: <span id="servidores-comprados">0</span></p>
        </div>
      </div>
    </main>

    <script src="./script.js"></script>
  </body>
