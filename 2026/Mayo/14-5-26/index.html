<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PokeDex</title>
    <link rel="stylesheet" href="./styles.css">
</head>
<body>
    <section class="pokedex-section" id="pokedex">
        <div class="container">
            <div class="section-header">
                <h2 class="section-subtitle">Explorador de Kanto</h2>
                <h1 class="section-title">Poke<span>Dex</span> Pro</h1>
            </div>

            <div class="pokedex-wrapper">
                <div class="search-pokedex">
                    <input type="text" id="poke-input" placeholder="Nobre o ID">
                    <button id="btn-poke">Buscar</button>
                </div>

                <div class="poke-screen" id="poke-screen">
                    <div class="screen-content">
                        <p class="char-placeholder">
                            Esperando señal del profesor oak.
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </section>


    <script src="./script.js"></script>
</body>
</html>
